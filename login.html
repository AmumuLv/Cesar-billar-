<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Billar</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="contenedor-login">
        <div class="tarjeta-login">
            <div class="logo-billar">🎱</div>
            <h1>Sistema de Billar</h1>
            <p class="subtitulo">Inicia sesión para continuar</p>

            <form id="formLogin">
                <div class="grupo-input">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" placeholder="Ingresa tu usuario" required>
                </div>

                <div class="grupo-input">
                    <label for="clave">Contraseña</label>
                    <input type="password" id="clave" placeholder="Ingresa tu contraseña" required>
                </div>

                <div class="extras-login">
                    <label>
                        <input type="checkbox"> Recordarme
                    </label>
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">Ingresar</button>
            </form>

            <p class="mensaje-demo">
                Demo: este login es solo visual por ahora.
            </p>
        </div>
    </div>

    <script>
        document.getElementById("formLogin").addEventListener("submit", function(e) {
            e.preventDefault();
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
